name: Deploy public app → Firebase (huddl-a3aec)

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'functions/**'
      - 'firestore.rules'
      - 'storage.rules'
      - 'firestore.indexes.json'
      - 'package.json'
      - 'vite.config.js'
      - '.env.public'
  workflow_dispatch:

jobs:
  deploy-public:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build public frontend
        run: npm run build:public
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.PUBLIC_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.PUBLIC_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: huddl-a3aec
          VITE_FIREBASE_STORAGE_BUCKET: huddl-a3aec.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "76655198209"
          VITE_FIREBASE_APP_ID: ${{ secrets.PUBLIC_FIREBASE_APP_ID }}
          VITE_BLOCKED_AUTH_EMAIL_DOMAIN: jackhenry.com
          VITE_ALLOWED_AUTH_EMAIL_DOMAIN: ""
          VITE_USE_FIRESTORE: "true"

      - name: Deploy hosting to public project
        run: npx firebase deploy --project huddl --only hosting:public --token "${{ secrets.FIREBASE_TOKEN }}"

  deploy-public-backend:
    runs-on: ubuntu-latest
    if: |
      contains(github.event.commits[0].modified, 'functions/') ||
      contains(github.event.commits[0].modified, 'firestore.rules') ||
      contains(github.event.commits[0].modified, 'storage.rules')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: cd functions && npm ci

      - name: Deploy backend to public project
        run: npx firebase deploy --project huddl --only functions,firestore,storage --token "${{ secrets.FIREBASE_TOKEN }}"
